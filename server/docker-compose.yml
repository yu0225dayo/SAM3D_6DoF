version: "3.8"

# SAM-6D マイクロサービス
# 使い方:
#   docker compose build sam6d   # 初回またはパッケージ変更時のみ
#   docker compose up -d sam6d
#
# コンテナは「CUDA + パッケージ入り実行環境」として扱う。
# server/ ディレクトリをまるごと /workspace にマウントするので
# コードを変更したら docker compose restart sam6d だけでよい。

services:
  sam6d:
    build:
      context: .
      dockerfile: Dockerfile.sam6d
    image: sam6d-service:latest
    container_name: sam6d_service
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      - ./:/workspace          # server/ 以下を丸ごとマウント（コード・データ共有）
    ports:
      - "127.0.0.1:8081:8081"
    command: >
      /opt/conda/envs/sam6d/bin/python /workspace/sam6d_service.py
        --sam6d-repo /workspace/SAM-6D
        --device cuda
        --segmentor sam
        --host 0.0.0.0
        --port 8081
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
